<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>OrvixPanel</title>
    <!-- Theme bootstrap: set the .dark class before paint so the
         user doesn't see a flash of the wrong theme. The actual
         class is applied by src/lib/theme/store.ts when the store
         hydrates. -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("orvix.theme");
          if (s === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="h-full bg-surface-0 text-ink-1 antialiased">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
